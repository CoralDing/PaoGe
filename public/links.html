<!DOCTYPE html>
<!--
  文件说明：PaoGe 合作伙伴页面，展示 CMS 维护的友情链接
  作者：Codex
  创建时间：2026-06-30
-->
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合作伙伴 - PaoGe</title>
    <meta name="description" content="PaoGe 合作伙伴与友情链接页面。">
    <link rel="canonical" href="https://pao.ge/links.html">
    <link rel="icon" href="/ico.ico">
    <style>
        :root { --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; --max:1120px; }
        [data-theme="dark"] { --bg:#080b12; --bg2:#101726; --panel:rgba(255,255,255,.08); --panel2:rgba(255,255,255,.13); --line:rgba(255,255,255,.13); --text:#f7fbff; --muted:rgba(247,251,255,.68); --weak:rgba(247,251,255,.44); --brand:#45f0c2; --brand2:#6c7cff; --brand3:#ffb86b; --shadow:0 24px 80px rgba(0,0,0,.32); }
        [data-theme="light"] { --bg:#f5f8fb; --bg2:#fff; --panel:rgba(255,255,255,.76); --panel2:rgba(255,255,255,.94); --line:rgba(16,23,38,.1); --text:#101726; --muted:rgba(16,23,38,.68); --weak:rgba(16,23,38,.46); --brand:#02b88a; --brand2:#5865f2; --brand3:#ef8f2f; --shadow:0 24px 70px rgba(33,46,70,.13); }
        * { box-sizing:border-box; } body { margin:0; min-height:100vh; font-family:var(--font); color:var(--text); background:radial-gradient(circle at 10% 10%, rgba(69,240,194,.22), transparent 30rem), radial-gradient(circle at 85% 0, rgba(108,124,255,.2), transparent 30rem), linear-gradient(135deg,var(--bg),var(--bg2)); } a { color:inherit; text-decoration:none; } button { font:inherit; cursor:pointer; border:0; }
        .shell { width:min(var(--max), calc(100% - 36px)); margin:0 auto; } .topbar { position:sticky; top:14px; z-index:10; display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:14px; padding:12px; border:1px solid var(--line); border-radius:24px; background:var(--panel2); backdrop-filter:blur(24px); box-shadow:var(--shadow); }
        .brand { display:flex; align-items:center; gap:12px; } .mark { width:42px; height:42px; display:grid; place-items:center; border-radius:15px; color:#071119; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand3)); } .name { font-size:1.15rem; font-weight:900; letter-spacing:-.04em; } .domain { color:var(--weak); font-size:.78rem; } .nav { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; } .nav a, .theme { padding:10px 13px; border-radius:999px; color:var(--muted); background:transparent; } .nav a:hover, .theme:hover { color:var(--text); background:var(--panel); }
        .hero { padding:86px 0 28px; } .eyebrow { display:inline-flex; padding:8px 12px; border:1px solid var(--line); border-radius:999px; color:var(--muted); background:var(--panel); } h1 { margin:22px 0 16px; max-width:880px; font-size:clamp(3rem,8vw,6.8rem); line-height:.92; letter-spacing:-.08em; } h1 span { color:transparent; background:linear-gradient(135deg,var(--brand),var(--brand2),var(--brand3)); -webkit-background-clip:text; background-clip:text; } .lead { max-width:720px; color:var(--muted); font-size:1.12rem; line-height:1.85; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin:20px 0 58px; } .link-card { min-height:128px; padding:20px; border:1px solid var(--line); border-radius:26px; background:var(--panel); box-shadow:var(--shadow); transition:.22s ease; } .link-card:hover { transform:translateY(-4px); background:var(--panel2); border-color:color-mix(in srgb,var(--brand),transparent 55%); } .link-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; } .icon { width:42px; height:42px; display:grid; place-items:center; border-radius:14px; color:#071119; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand2)); overflow:hidden; } .icon img { width:100%; height:100%; object-fit:cover; } h3 { margin:0; font-size:1.05rem; } p { margin:0; color:var(--muted); line-height:1.65; } .empty { padding:46px 20px; border:1px dashed var(--line); border-radius:26px; color:var(--muted); text-align:center; }
        .footer { display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:36px 0 24px; padding-top:20px; border-top:1px solid var(--line); color:var(--weak); } @media (max-width:760px) { .topbar { align-items:flex-start; flex-wrap:wrap; } .nav { width:100%; justify-content:flex-start; } }
    </style>
</head>
<body>
<header class="shell topbar"><a class="brand" href="/"><div class="mark">PG</div><div><div class="name">PaoGe</div><div class="domain">pao.ge</div></div></a><nav class="nav"><a href="/">首页</a><a href="/about.html">关于</a><a href="/contribute.html">提交收录</a><button class="theme" id="themeBtn" type="button">切换主题</button></nav></header>
<main class="shell">
    <section class="hero"><div class="eyebrow">合作伙伴</div><h1>和同样认真做站的人<span>彼此连接。</span></h1><p class="lead">这里展示 PaoGe 的合作伙伴和友情链接。我们偏好稳定、清爽、有明确价值的网站。</p></section>
    <section class="grid" id="linksGrid"><div class="empty">正在加载合作伙伴...</div></section>
</main>
<footer class="shell footer"><div>PaoGe © 2026 · pao.ge</div><div><a href="/admin">管理后台</a></div></footer>
<script>
const root = document.documentElement;
root.dataset.theme = localStorage.getItem('paoge-theme') || root.dataset.theme;
document.getElementById('themeBtn').addEventListener('click', () => { const next = root.dataset.theme === 'dark' ? 'light' : 'dark'; root.dataset.theme = next; localStorage.setItem('paoge-theme', next); });

// 对接口返回内容做 HTML 转义，避免友链名称或描述中混入脚本影响页面安全。
function escapeHtml(value = '') { return String(value).replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char])); }
function renderIcon(link) { const icon = link.icon || link.name?.[0] || '↗'; return /^https?:\/\//.test(icon) || icon.startsWith('/') ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(link.name)}" loading="lazy">` : escapeHtml(icon); }

// 友链由 CMS 管理，接口失败时给出空状态，避免误导用户以为已有合作关系。
(async () => {
    const grid = document.getElementById('linksGrid');
    try {
        const res = await fetch('/api/links');
        const links = res.ok ? await res.json() : [];
        if (!links.length) { grid.innerHTML = '<div class="empty">暂无合作伙伴，欢迎通过提交页联系交换。</div>'; return; }
        grid.innerHTML = links.map(link => `<a class="link-card" href="${escapeHtml(link.url)}" target="_blank" rel="noopener"><div class="link-top"><div class="icon">${renderIcon(link)}</div><h3>${escapeHtml(link.name)}</h3></div><p>${escapeHtml(link.description || '值得访问的合作伙伴')}</p></a>`).join('');
    } catch (_) { grid.innerHTML = '<div class="empty">暂时无法加载合作伙伴，请稍后再试。</div>'; }
})();
</script>
</body>
</html>
