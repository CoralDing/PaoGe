<!DOCTYPE html>
<!--
  文件说明：PaoGe 首页入口，负责站点导航展示、搜索、主题切换和 CMS 数据接入
  作者：Codex
  创建时间：2026-06-30
-->
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaoGe - 高效上网入口 | pao.ge</title>
    <meta name="description" content="PaoGe 是一个面向效率、创作、开发与日常生活的高质量网址导航，帮助你更快抵达值得访问的网络资源。">
    <meta name="keywords" content="PaoGe,pao.ge,网址导航,效率工具,AI工具,开发资源,设计资源,资源导航">
    <meta name="author" content="PaoGe">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pao.ge/">
    <link rel="icon" href="/ico.ico">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PaoGe",
        "url": "https://pao.ge/",
        "description": "面向效率、创作、开发与日常生活的高质量网址导航。",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://pao.ge/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    <style>
        :root {
            --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            --ease: cubic-bezier(.2,.8,.2,1);
            --radius-xs: 10px;
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 34px;
            --shadow-soft: 0 24px 80px rgba(0,0,0,.18);
            --max: 1240px;
        }

        [data-theme="dark"] {
            --bg: #080b12;
            --bg-2: #101726;
            --panel: rgba(255,255,255,.075);
            --panel-strong: rgba(255,255,255,.12);
            --line: rgba(255,255,255,.12);
            --text: #f7fbff;
            --muted: rgba(247,251,255,.68);
            --weak: rgba(247,251,255,.42);
            --brand: #45f0c2;
            --brand-2: #6c7cff;
            --brand-3: #ffb86b;
            --danger: #ff6f91;
            --shadow: 0 20px 70px rgba(0,0,0,.35);
        }

        [data-theme="light"] {
            --bg: #f5f8fb;
            --bg-2: #ffffff;
            --panel: rgba(255,255,255,.72);
            --panel-strong: rgba(255,255,255,.92);
            --line: rgba(16,23,38,.1);
            --text: #101726;
            --muted: rgba(16,23,38,.68);
            --weak: rgba(16,23,38,.42);
            --brand: #02b88a;
            --brand-2: #5865f2;
            --brand-3: #ef8f2f;
            --danger: #e54568;
            --shadow: 0 20px 60px rgba(33,46,70,.12);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font);
            color: var(--text);
            background:
                radial-gradient(circle at 12% 8%, rgba(69,240,194,.22), transparent 28rem),
                radial-gradient(circle at 85% 16%, rgba(108,124,255,.22), transparent 30rem),
                linear-gradient(135deg, var(--bg), var(--bg-2));
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }
        button, input { font: inherit; }
        button { border: 0; cursor: pointer; }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: .12;
            background-image: linear-gradient(115deg, transparent 0 47%, rgba(255,255,255,.13) 48% 52%, transparent 53% 100%);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at 50% 0, #000, transparent 65%);
        }

        .shell {
            width: min(var(--max), calc(100% - 36px));
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .topbar {
            position: sticky;
            top: 14px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 14px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: color-mix(in srgb, var(--panel-strong), transparent 10%);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-width: max-content;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 15px;
            color: #081017;
            font-weight: 900;
            background: linear-gradient(135deg, var(--brand), var(--brand-3));
            box-shadow: 0 12px 28px rgba(69,240,194,.28);
        }

        .brand-name { font-weight: 900; letter-spacing: -.04em; font-size: 1.2rem; }
        .brand-domain { color: var(--weak); font-size: .78rem; margin-top: 2px; }

        .nav-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
        }

        .nav-links a, .theme-btn {
            padding: 10px 14px;
            border-radius: 999px;
            color: var(--muted);
            background: transparent;
            transition: .22s var(--ease);
        }

        .nav-links a:hover, .theme-btn:hover { color: var(--text); background: var(--panel); }

        .admin-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            border-radius: 999px;
            color: #071119;
            font-weight: 800;
            background: linear-gradient(135deg, var(--brand), var(--brand-3));
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr);
            align-items: center;
            gap: 34px;
            padding: 88px 0 44px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            background: var(--panel);
        }

        .hero h1 {
            margin: 22px 0 18px;
            max-width: 820px;
            font-size: clamp(3.1rem, 8vw, 7.6rem);
            line-height: .9;
            letter-spacing: -.08em;
        }

        .hero h1 span {
            display: inline-block;
            color: transparent;
            background: linear-gradient(135deg, var(--brand), var(--brand-2) 48%, var(--brand-3));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .hero p {
            max-width: 680px;
            margin: 0 0 28px;
            color: var(--muted);
            font-size: clamp(1rem, 2vw, 1.22rem);
            line-height: 1.8;
        }

        .search-panel {
            display: grid;
            gap: 12px;
            padding: 12px;
            max-width: 760px;
            border: 1px solid var(--line);
            border-radius: 26px;
            background: var(--panel-strong);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(28px);
        }

        .search-row { display: flex; gap: 10px; }
        .search-row input {
            width: 100%;
            min-height: 56px;
            padding: 0 18px;
            border: 1px solid transparent;
            border-radius: 18px;
            outline: 0;
            color: var(--text);
            background: color-mix(in srgb, var(--bg), transparent 62%);
        }

        .search-row input:focus { border-color: color-mix(in srgb, var(--brand), transparent 50%); }
        .search-row button {
            min-width: 116px;
            border-radius: 18px;
            color: #071119;
            font-weight: 900;
            background: linear-gradient(135deg, var(--brand), var(--brand-3));
        }

        .engines { display: flex; flex-wrap: wrap; gap: 8px; }
        .engine {
            padding: 8px 11px;
            border-radius: 999px;
            color: var(--muted);
            background: transparent;
        }
        .engine.active { color: #071119; background: var(--brand); font-weight: 800; }

        .hero-card {
            position: relative;
            min-height: 360px;
            padding: 26px;
            border: 1px solid var(--line);
            border-radius: 36px;
            background: linear-gradient(160deg, var(--panel-strong), var(--panel));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero-card::before {
            content: "";
            position: absolute;
            inset: -30% -20% auto auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: var(--brand);
            filter: blur(80px);
            opacity: .34;
        }

        .metric-grid { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .metric {
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: color-mix(in srgb, var(--panel), transparent 10%);
        }
        .metric strong { display: block; font-size: 2rem; letter-spacing: -.05em; }
        .metric span { color: var(--weak); font-size: .86rem; }
        .daily-tip { position: relative; margin-top: 16px; padding: 18px; border-radius: 22px; color: var(--muted); background: color-mix(in srgb, var(--bg), transparent 62%); line-height: 1.7; }

        .section-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin: 30px 0 18px;
        }
        .section-head h2 { margin: 0; font-size: clamp(1.7rem, 3vw, 2.7rem); letter-spacing: -.05em; }
        .section-head p { margin: 8px 0 0; color: var(--muted); }

        .cat-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 6px 0 16px;
            scrollbar-width: none;
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex: 0 0 auto;
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            background: var(--panel);
            transition: .22s var(--ease);
        }
        .cat-pill.active { color: #071119; border-color: transparent; background: linear-gradient(135deg, var(--brand), var(--brand-3)); font-weight: 900; }

        .site-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .site-card {
            position: relative;
            display: flex;
            gap: 14px;
            min-height: 118px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            overflow: hidden;
            transition: transform .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease);
        }
        .site-card:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--brand), transparent 55%); background: var(--panel-strong); }
        .site-icon {
            flex: 0 0 auto;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            color: #071119;
            font-weight: 900;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            overflow: hidden;
        }
        .site-icon img { width: 100%; height: 100%; object-fit: cover; }
        .site-card h3 { margin: 0 0 7px; font-size: 1.03rem; }
        .site-card p { margin: 0; color: var(--muted); font-size: .9rem; line-height: 1.55; }
        .site-meta { margin-top: 12px; color: var(--weak); font-size: .78rem; }

        .empty {
            padding: 56px 20px;
            border: 1px dashed var(--line);
            border-radius: 24px;
            color: var(--muted);
            text-align: center;
        }

        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 14px;
            margin: 58px 0 28px;
            padding-top: 22px;
            border-top: 1px solid var(--line);
            color: var(--weak);
        }
        .footer a { color: var(--muted); }

        @media (max-width: 860px) {
            .topbar { align-items: flex-start; flex-wrap: wrap; }
            .nav-links { order: 3; width: 100%; justify-content: flex-start; overflow-x: auto; }
            .hero { grid-template-columns: 1fr; padding-top: 54px; }
            .hero-card { min-height: auto; }
            .search-row { flex-direction: column; }
            .search-row button { min-height: 52px; }
        }

        @media (max-width: 560px) {
            .shell { width: min(100% - 24px, var(--max)); }
            .admin-link { width: 100%; justify-content: center; }
            .site-grid { grid-template-columns: 1fr; }
            .metric-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="noise" aria-hidden="true"></div>

<header class="shell topbar">
    <a class="brand" href="/" aria-label="PaoGe 首页">

        <div>
            <div class="brand-name">PaoGe</div>

    </a>
    <nav class="nav-links" aria-label="主导航">

<main class="shell">
    <section class="hero">
        <div>
            <div class="eyebrow">⚡ 高效、清爽、可持续维护的上网入口</div>
            <h1>去更远的地方，<span>从 PaoGe 开始。</span></h1>
            <p>PaoGe 聚合值得长期使用的网站、工具和内容入口。页面围绕“快速抵达”重新设计，保留 CMS 后台能力，但弱化干扰，让你打开即用。</p>
            <form class="search-panel" id="searchForm">
                <div class="search-row">
                    <input id="searchInput" type="search" placeholder="搜索关键词，或输入网址直接访问" autocomplete="off">
                    <button type="submit">立即出发</button>

                <div class="engines" id="engineBar" aria-label="搜索引擎"></div>

                <div class="metric"><strong id="catCount">--</strong><span>资源分组</span></div>
                <div class="metric"><strong>0</strong><span>多余弹窗</span></div>
                <div class="metric"><strong>24h</strong><span>随时可用</span></div>

            <div class="daily-tip" id="dailyTip">好的导航不是堆满链接，而是减少选择成本。</div>

    <section id="sites">
        <div class="section-head">
            <div>
                <h2>资源导航</h2>

            </div>
        </div>
        <div class="cat-bar" id="catBar"></div>
        <div class="site-grid" id="siteGrid"></div>
    </section>
</main>

<footer class="shell footer">
    <div>PaoGe © 2026 · pao.ge</div>
    <div><a href="about.html">关于</a> · <a href="links.html">友链</a> · <a href="contribute.html">提交收录</a></div>
</footer>

<script>
// 默认分类用于接口不可用时兜底，避免纯静态打开时页面为空。
const fallbackCategories = [
    { id: 'featured', name: '精选推荐', icon: '✨', is_active: 1 },
    { id: 'ai', name: 'AI 工具', icon: '🤖', is_active: 1 },
    { id: 'dev', name: '开发资源', icon: '⌨️', is_active: 1 },
    { id: 'design', name: '设计灵感', icon: '🎨', is_active: 1 },
    { id: 'tools', name: '效率工具', icon: '🧰', is_active: 1 },
    { id: 'media', name: '内容媒体', icon: '🎬', is_active: 1 }
];

// 默认站点只放通用高质量入口，避免页面残留旧项目的垂直分类和命名痕迹。
const fallbackSites = [
    { id: 1, name: 'OpenAI', url: 'https://openai.com', description: 'AI 产品与研究入口', icon: '🤖', category: 'ai', status: 'active' },
    { id: 2, name: 'ChatGPT', url: 'https://chatgpt.com', description: '智能对话与创作助手', icon: '💬', category: 'ai', status: 'active' },
    { id: 3, name: 'GitHub', url: 'https://github.com', description: '代码托管与开源协作平台', icon: '⌘', category: 'dev', status: 'active' },
    { id: 4, name: 'MDN Web Docs', url: 'https://developer.mozilla.org', description: 'Web 标准与前端技术文档', icon: '📚', category: 'dev', status: 'active' },
    { id: 5, name: 'Vercel', url: 'https://vercel.com', description: '前端应用部署与托管平台', icon: '▲', category: 'dev', status: 'active' },
    { id: 6, name: 'Figma', url: 'https://figma.com', description: '协作式界面设计工具', icon: '🎛️', category: 'design', status: 'active' },
    { id: 7, name: 'Dribbble', url: 'https://dribbble.com', description: '设计作品与视觉灵感社区', icon: '🏀', category: 'design', status: 'active' },
    { id: 8, name: 'Notion', url: 'https://notion.so', description: '文档、知识库与项目管理工具', icon: 'N', category: 'tools', status: 'active' },
    { id: 9, name: 'ProcessOn', url: 'https://processon.com', description: '流程图、思维导图与协作白板', icon: '🧭', category: 'tools', status: 'active' },
    { id: 10, name: 'YouTube', url: 'https://youtube.com', description: '视频内容与知识频道平台', icon: '▶', category: 'media', status: 'active' },
    { id: 11, name: 'Bilibili', url: 'https://www.bilibili.com', description: '中文视频内容与社区平台', icon: 'B', category: 'media', status: 'active' },
    { id: 12, name: 'Product Hunt', url: 'https://www.producthunt.com', description: '发现新产品和创意工具', icon: 'P', category: 'featured', status: 'active' }
];

const searchEngines = [
    { id: 'google', name: 'Google', url: 'https://www.google.com/search?q=' },
    { id: 'bing', name: 'Bing', url: 'https://www.bing.com/search?q=' },
    { id: 'baidu', name: '百度', url: 'https://www.baidu.com/s?wd=' },
    { id: 'duck', name: 'DuckDuckGo', url: 'https://duckduckgo.com/?q=' }
];

let categories = [...fallbackCategories];
let sites = [...fallbackSites];
let activeCategory = 'all';
let activeEngine = localStorage.getItem('paoge-engine') || 'bing';

const byId = id => document.getElementById(id);

// 统一处理文本输出，避免接口数据中带有 HTML 时直接插入页面造成脚本注入风险。
function escapeHtml(value = '') {
    return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
}

// 站点图标可能是 emoji、图片地址或空值，这里做兼容处理，保证卡片布局稳定。
function renderIcon(site) {
    const icon = site.icon || site.ico || site.name?.[0] || '↗';
    if (/^https?:\/\//.test(icon) || icon.startsWith('/')) {
        return `<img src="${escapeHtml(icon)}" alt="${escapeHtml(site.name)}" loading="lazy" onerror="this.parentElement.textContent='${escapeHtml(site.name?.[0] || '↗')}'">`;
    }
    return escapeHtml(icon);
}

// 每次分类切换都重绘卡片，数据量不大时这种方式最简单，也便于后续接入搜索过滤。
function renderSites() {
    const list = sites.filter(site => site.status !== 'inactive' && (activeCategory === 'all' || site.category === activeCategory));
    byId('siteCount').textContent = sites.filter(site => site.status !== 'inactive').length;
    byId('catCount').textContent = categories.filter(cat => cat.is_active !== 0).length;

    if (!list.length) {
        byId('siteGrid').innerHTML = '<div class="empty">当前分类暂无内容，稍后可在后台补充。</div>';
        return;
    }

    byId('siteGrid').innerHTML = list.map(site => `
        <a class="site-card" href="${escapeHtml(site.url)}" target="_blank" rel="noopener${site.nofollow ? ' nofollow' : ''}" data-id="${site.id || ''}">
            <div class="site-icon">${renderIcon(site)}</div>
            <div>
                <h3>${escapeHtml(site.name)}</h3>
                <p>${escapeHtml(site.description || site.desc || '值得收藏的网络入口')}</p>
                <div class="site-meta">${escapeHtml(categories.find(cat => cat.id === site.category)?.name || '未分类')} · 打开资源</div>
            </div>
        </a>
    `).join('');

    document.querySelectorAll('.site-card').forEach(card => {
        card.addEventListener('click', () => {
            const id = card.dataset.id;
            if (id) fetch(`/api/sites/${id}/click`, { method: 'POST' }).catch(() => {});
        });
    });
}

function renderCategories() {
    const visible = categories.filter(cat => cat.is_active !== 0);
    byId('catBar').innerHTML = [
        { id: 'all', name: '全部', icon: '🌐' },
        ...visible
    ].map(cat => `<button class="cat-pill ${cat.id === activeCategory ? 'active' : ''}" type="button" data-cat="${escapeHtml(cat.id)}">${escapeHtml(cat.icon || '📁')} ${escapeHtml(cat.name)}</button>`).join('');

    document.querySelectorAll('.cat-pill').forEach(button => {
        button.addEventListener('click', () => {
            activeCategory = button.dataset.cat;
            renderCategories();
            renderSites();
        });
    });
}

function renderEngines() {
    byId('engineBar').innerHTML = searchEngines.map(engine =>
        `<button class="engine ${engine.id === activeEngine ? 'active' : ''}" type="button" data-engine="${engine.id}">${engine.name}</button>`
    ).join('');
    document.querySelectorAll('.engine').forEach(button => {
        button.addEventListener('click', () => {
            activeEngine = button.dataset.engine;
            localStorage.setItem('paoge-engine', activeEngine);
            renderEngines();
        });
    });
}

// 搜索框支持“关键词搜索”和“网址直达”，减少用户在搜索和地址栏之间来回切换。
function bindSearch() {
    byId('searchForm').addEventListener('submit', event => {
        event.preventDefault();
        const keyword = byId('searchInput').value.trim();
        if (!keyword) return;
        const looksLikeUrl = /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}/i.test(keyword);
        if (looksLikeUrl) {
            window.open(keyword.startsWith('http') ? keyword : `https://${keyword}`, '_blank', 'noopener');
            return;
        }
        const engine = searchEngines.find(item => item.id === activeEngine) || searchEngines[0];
        window.open(engine.url + encodeURIComponent(keyword), '_blank', 'noopener');
    });
}

function bindTheme() {
    const saved = localStorage.getItem('paoge-theme') || 'dark';
    document.documentElement.dataset.theme = saved;
    byId('themeBtn').addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('paoge-theme', next);
    });
}

// CMS 接口失败时继续使用兜底数据，保证静态部署和本地服务未启动时都能展示基础内容。
async function loadCmsData() {
    try {
        const [siteRes, catRes, settingsRes] = await Promise.all([
            fetch('/api/sites').catch(() => null),
            fetch('/api/categories').catch(() => null),
            fetch('/api/settings').catch(() => null)
        ]);

        if (siteRes?.ok) {
            const apiSites = await siteRes.json();
            if (Array.isArray(apiSites) && apiSites.length) sites = apiSites;
        }
        if (catRes?.ok) {
            const apiCategories = await catRes.json();
            if (Array.isArray(apiCategories) && apiCategories.length) categories = apiCategories;
        }
        if (settingsRes?.ok) {
            const settings = await settingsRes.json();
            if (settings.site_icon) {
                const icon = document.querySelector('link[rel="icon"]');
                icon.href = settings.site_icon;
            }
            if (settings.site_description) byId('dailyTip').textContent = settings.site_description;
        }
    } finally {
        renderCategories();
        renderSites();
    }
}

bindTheme();
bindSearch();
renderEngines();
loadCmsData();
</script>
